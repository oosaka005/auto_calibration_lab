# Auto Calibration Lab - Docker Compose
#
# Usage:
#   docker compose up -d --build
#
# Infrastructure (MongoDB, PostgreSQL) is included below.
# Credentials are set to defaults (madsci/madsci) — change for production use.

# * Common configuration for MADSci services
# Note: network_mode: host is replaced with bridge networking + explicit ports
# to ensure services are accessible from the Windows host on Docker Desktop.
x-madsci-service: &madsci-service
  build: .
  env_file:
    - ./.env
  volumes:
    - .:/home/madsci/auto_calibration_lab
    - ./.madsci:/home/madsci/.madsci
  restart: unless-stopped
  working_dir: /home/madsci/auto_calibration_lab
  networks:
    - madsci_net

services:

  # ---- Infrastructure ----

  madsci_mongodb:
    container_name: madsci_mongodb
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - ${MONGODB_PORT:-27017}:27017
    volumes:
      - ./.madsci/mongodb:/data/db
    networks:
      - madsci_net

  madsci_redis:
    container_name: madsci_redis
    image: redis:7.4
    restart: unless-stopped
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ./.madsci/redis:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    networks:
      - madsci_net

  madsci_postgres:
    container_name: madsci_postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=madsci
      # TODO: Change password for production
      - POSTGRES_PASSWORD=madsci
      - POSTGRES_DB=madsci_resources
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - ./.madsci/postgresql/data:/var/lib/postgresql/data
    networks:
      - madsci_net

  # ---- MADSci Managers ----

  lab_manager:
    <<: *madsci-service
    container_name: lab_manager
    image: ghcr.io/ad-sdl/madsci_dashboard:latest
    command: python -m madsci.squid.lab_server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    depends_on:
      - event_manager
    ports:
      - "8000:8000"
    environment:
      - LAB_SERVER_URL=http://0.0.0.0:8000/

  event_manager:
    <<: *madsci-service
    container_name: event_manager
    command: python -m madsci.event_manager.event_server
    depends_on:
      - madsci_mongodb
    ports:
      - "8001:8001"
    environment:
      - EVENT_SERVER_URL=http://0.0.0.0:8001/
      - EVENT_MONGO_DB_URL=mongodb://madsci_mongodb:27017/

  experiment_manager:
    <<: *madsci-service
    container_name: experiment_manager
    command: python -m madsci.experiment_manager.experiment_server
    depends_on:
      - madsci_mongodb
      - lab_manager
    ports:
      - "8002:8002"
    environment:
      - EXPERIMENT_SERVER_URL=http://0.0.0.0:8002/
      - EXPERIMENT_MONGO_DB_URL=mongodb://madsci_mongodb:27017/
      - EVENT_SERVER_URL=http://event_manager:8001/

  resource_manager:
    <<: *madsci-service
    container_name: resource_manager
    command: python -m madsci.resource_manager.resource_server
    depends_on:
      - madsci_postgres
      - event_manager
    ports:
      - "8003:8003"
    environment:
      - RESOURCE_SERVER_URL=http://0.0.0.0:8003/
      - RESOURCE_DB_URL=postgresql://madsci:madsci@madsci_postgres:5432/madsci_resources
      - EVENT_SERVER_URL=http://event_manager:8001/

  data_manager:
    <<: *madsci-service
    container_name: data_manager
    command: python -m madsci.data_manager.data_server
    depends_on:
      - madsci_mongodb
      - event_manager
    ports:
      - "8004:8004"
    environment:
      - DATA_SERVER_URL=http://0.0.0.0:8004/
      - DATA_MONGO_DB_URL=mongodb://madsci_mongodb:27017/
      - EVENT_SERVER_URL=http://event_manager:8001/

  workcell_manager:
    <<: *madsci-service
    container_name: workcell_manager
    command: python -m madsci.workcell_manager.workcell_server
    depends_on:
      - madsci_redis
      - madsci_mongodb
      - resource_manager
      - event_manager
      - location_manager
    ports:
      - "8005:8005"
    environment:
      - WORKCELL_SERVER_URL=http://0.0.0.0:8005/
      - WORKCELL_MONGO_DB_URL=mongodb://madsci_mongodb:27017/
      - WORKCELL_REDIS_HOST=madsci_redis
      - EVENT_SERVER_URL=http://event_manager:8001/
      - RESOURCE_SERVER_URL=http://resource_manager:8003/
      - LOCATION_SERVER_URL=http://location_manager:8006/
      # Override workcell_nodes from settings.yaml with Docker-internal service names
      # NOTE: Update this list every time a new node service is added.
      - WORKCELL_NODES={"high_viscosity_liquid_weighing_1":"http://high_viscosity_liquid_weighing_1:2000/","human_node_1":"http://human_node_1:2001/"}

  location_manager:
    <<: *madsci-service
    container_name: location_manager
    command: python -m madsci.location_manager.location_server
    depends_on:
      - madsci_redis
      - event_manager
      - resource_manager
    ports:
      - "8006:8006"
    environment:
      - LOCATION_SERVER_URL=http://0.0.0.0:8006/
      - LOCATION_REDIS_HOST=madsci_redis
      - EVENT_SERVER_URL=http://event_manager:8001/
      - RESOURCE_SERVER_URL=http://resource_manager:8003/

  # ---- Nodes ----

  high_viscosity_liquid_weighing_1:
    <<: *madsci-service
    container_name: high_viscosity_liquid_weighing_1
    command: python modules/high_viscosity_liquid_weighing/high_viscosity_liquid_weighing.py
    depends_on:
      - event_manager
    ports:
      - "2000:2000"
    environment:
      - PYTHONPATH=/home/madsci/auto_calibration_lab
      - NODE_NAME=high_viscosity_liquid_weighing_1
      - NODE_MODULE_NAME=high_viscosity_liquid_weighing
      - NODE_URL=http://0.0.0.0:2000/
      - EVENT_SERVER_URL=http://event_manager:8001/
      - RESOURCE_SERVER_URL=http://resource_manager:8003/
      - DATA_SERVER_URL=http://data_manager:8004/

  human_node_1:
    <<: *madsci-service
    container_name: human_node_1
    command: python modules/human_node/human_node.py
    depends_on:
      - event_manager
    ports:
      - "2001:2001"
    environment:
      - PYTHONPATH=/home/madsci/auto_calibration_lab
      - NODE_NAME=human_node_1
      - NODE_MODULE_NAME=human_node
      - NODE_URL=http://0.0.0.0:2001/
      - EVENT_SERVER_URL=http://event_manager:8001/
      - RESOURCE_SERVER_URL=http://resource_manager:8003/

networks:
  madsci_net:
    driver: bridge

