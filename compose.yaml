# Auto Calibration Lab - Docker Compose
#
# Usage:
#   docker compose up -d
#
# TODO: Before first use, update the following in .env:
#   RESOURCE_DB_URL=postgresql://madsci:madsci@localhost:5432/madsci_resources
#
# Infrastructure (MongoDB, PostgreSQL) is included below.
# Credentials are set to defaults (madsci/madsci) — change for production use.

# * Common configuration for MADSci services
x-madsci-service: &madsci-service
  image: ghcr.io/ad-sdl/madsci:latest
  network_mode: host
  env_file:
    - ./.env
  volumes:
    - .:/home/madsci/auto_calibration_lab
    - ./.madsci:/home/madsci/.madsci
  restart: unless-stopped
  working_dir: /home/madsci/auto_calibration_lab

services:

  # ---- Infrastructure ----

  madsci_mongodb:
    container_name: madsci_mongodb
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - ${MONGODB_PORT:-27017}:27017
    volumes:
      - ./.madsci/mongodb:/data/db

  madsci_redis:
    container_name: madsci_redis
    image: redis:7.4
    restart: unless-stopped
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ./.madsci/redis:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000

  madsci_postgres:
    container_name: madsci_postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=madsci
      # TODO: Change password for production
      - POSTGRES_PASSWORD=madsci
      - POSTGRES_DB=madsci_resources
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - ./.madsci/postgresql/data:/var/lib/postgresql/data

  # ---- MADSci Managers ----

  lab_manager:
    <<: *madsci-service
    container_name: lab_manager
    image: ghcr.io/ad-sdl/madsci_dashboard:latest
    command: python -m madsci.squid.lab_server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    depends_on:
      - event_manager

  event_manager:
    <<: *madsci-service
    container_name: event_manager
    command: python -m madsci.event_manager.event_server
    depends_on:
      - madsci_mongodb

  experiment_manager:
    <<: *madsci-service
    container_name: experiment_manager
    command: python -m madsci.experiment_manager.experiment_server
    depends_on:
      - madsci_mongodb
      - lab_manager

  resource_manager:
    <<: *madsci-service
    container_name: resource_manager
    command: python -m madsci.resource_manager.resource_server
    depends_on:
      - madsci_postgres
      - event_manager

  data_manager:
    <<: *madsci-service
    container_name: data_manager
    command: python -m madsci.data_manager.data_server
    depends_on:
      - madsci_mongodb
      - event_manager

  workcell_manager:
    <<: *madsci-service
    container_name: workcell_manager
    command: python -m madsci.workcell_manager.workcell_server
    depends_on:
      - madsci_redis
      - madsci_mongodb
      - resource_manager
      - event_manager
      - location_manager

  location_manager:
    <<: *madsci-service
    container_name: location_manager
    command: python -m madsci.location_manager.location_server
    depends_on:
      - madsci_redis
      - event_manager
      - resource_manager

  # ---- Nodes ----

  high_viscosity_liquid_weighing_1:
    <<: *madsci-service
    container_name: high_viscosity_liquid_weighing_1
    environment:
      - NODE_NAME=high_viscosity_liquid_weighing_1
      - NODE_MODULE_NAME=high_viscosity_liquid_weighing
      - NODE_URL=http://localhost:2000
    command: python modules/high_viscosity_liquid_weighing/high_viscosity_liquid_weighing.py
    depends_on:
      - event_manager
