name: calibration_and_accuracy_test

metadata:
  description: >
    Full dispenser calibration and gravimetric accuracy test with human-in-the-loop review.
    Step 1: Calibrate dispenser across a speed range.
    Step 2: Generate calibration plot → operator reviews → save to Resource Manager.
    Step 3: Dispense to multiple target masses using calibrated parameters.
    Step 4: Generate dispense accuracy parity plot → operator reviews.
  version: 1.0

parameters:
  json_inputs:
    - key: material_name
      description: Name of the material registered in the Resource Manager
    - key: pressure_mpa
      description: Operating pressure [MPa]
    - key: volume_per_step_ml
      description: Dispense volume per calibration speed step [mL]
    - key: speed_start_ml_per_min
      description: Start speed for calibration sweep [mL/min]
    - key: speed_end_ml_per_min
      description: End speed for calibration sweep [mL/min]
    - key: speed_step_ml_per_min
      description: Speed increment for calibration sweep [mL/min]
    - key: target_masses_g
      description: "List of target masses for accuracy test [g], e.g. [0.01, 0.032, 0.1, 0.316, 1.0]"
  feed_forward:
    - key: calibration_result
      step: calibrate_dispenser
      data_type: json
    - key: batch_result
      step: dispense_batch
      data_type: json

steps:
  - name: Calibrate Dispenser
    key: calibrate_dispenser
    node: high_viscosity_liquid_weighing_1
    action: calibrate_dispenser
    use_parameters:
      args:
        material_name: material_name
        pressure_mpa: pressure_mpa
        volume_per_step_ml: volume_per_step_ml
        speed_start_ml_per_min: speed_start_ml_per_min
        speed_end_ml_per_min: speed_end_ml_per_min
        speed_step_ml_per_min: speed_step_ml_per_min

  - name: Generate Calibration Plot
    key: generate_calibration_plot
    node: human_node_1
    action: generate_calibration_plot
    description: "Generates dual-axis calibration chart and saves to Data Manager (.madsci/datapoints/)."
    use_parameters:
      args:
        calibration_result: calibration_result

  - name: Wait for Calibration Review
    key: wait_for_approval_1
    node: human_node_1
    action: wait_for_approval
    description: "Operator: review the calibration plot, then press Resume to save results."

  - name: Save Calibration to Resource Manager
    key: save_calibration_to_resource
    node: human_node_1
    action: save_calibration_to_resource
    description: "Saves throughput/accuracy to Resource Manager. Then proceed to dispense test."
    use_parameters:
      args:
        calibration_result: calibration_result

  - name: Dispense Accuracy Test (Batch)
    key: dispense_batch
    node: high_viscosity_liquid_weighing_1
    action: dispense_batch
    description: "Dispenses each target mass in target_masses_g. material_name/pressure_mpa come from calibration_result."
    use_parameters:
      args:
        calibration_result: calibration_result
        target_masses_g: target_masses_g

  - name: Generate Dispense Parity Plot
    key: generate_dispense_plot
    node: human_node_1
    action: generate_dispense_plot
    description: "Generates parity plot (log scale) and saves to Data Manager."
    use_parameters:
      args:
        batch_result: batch_result

  - name: Wait for Dispense Result Review
    key: wait_for_approval_2
    node: human_node_1
    action: wait_for_approval
    description: "Operator: review the parity plot, then press Resume to complete the workflow."
