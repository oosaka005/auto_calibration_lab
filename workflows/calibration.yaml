name: dispenser_calibration
definition_metadata:
  description: >
    Calibrates a dispenser by estimating density [g/step] and dispensing rates
    [g/s] at minimum and maximum motor speeds.
  version: 0.1.0

parameters:
  - parameter_type: json_input
    key: rotations_per_increment
    description: Motor rotations dispensed per increment for density calibration
    default: 2.0
  - parameter_type: json_input
    key: num_increments
    description: Number of increments for density calibration
    default: 5
  - parameter_type: json_input
    key: density_speed_rps
    description: Motor speed during density calibration [rev/s]
    default: 1.0
  - parameter_type: json_input
    key: min_speed_rps
    description: Minimum motor speed for speed calibration [rev/s]
    default: 0.5
  - parameter_type: json_input
    key: max_speed_rps
    description: Maximum motor speed for speed calibration [rev/s]
    default: 2.0
  - parameter_type: json_input
    key: speed_duration_s
    description: Duration to run motor at each speed [s]
    default: 10.0

steps:
  - key: tare_for_density
    name: Tare balance before density calibration
    node: high_viscosity_liquid_weighing
    action: tare

  - key: density_calibration
    name: Calibrate density
    node: high_viscosity_liquid_weighing
    action: calibrate_density
    use_parameters:
      args:
        rotations_per_increment: rotations_per_increment
        num_increments: num_increments
        speed_rps: density_speed_rps

  - key: speed_calibration
    name: Calibrate dispensing speed at min/max motor speeds
    node: high_viscosity_liquid_weighing
    action: calibrate_speed
    use_parameters:
      args:
        min_speed_rps: min_speed_rps
        max_speed_rps: max_speed_rps
        duration_s: speed_duration_s
