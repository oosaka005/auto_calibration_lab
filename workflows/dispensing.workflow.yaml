name: dispense_target_mass

metadata:
  description: >
    Dispenses a specified target mass of high-viscosity liquid and reports
    the actual dispensed mass and error.
  version: 0.1.0

parameters:
  json_inputs:
    - key: target_g
      description: Target mass to dispense [g]
    - key: speed_rps
      description: Motor speed during dispensing [rev/s]
      default: 1.0

steps:
  - key: tare
    name: Tare balance before dispensing
    node: high_viscosity_liquid_weighing
    action: tare

  - key: dispense
    name: Dispense to target mass
    node: high_viscosity_liquid_weighing
    action: dispense_target_mass
    use_parameters:
      args:
        target_g: target_g
        speed_rps: speed_rps
