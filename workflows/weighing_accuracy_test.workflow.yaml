name: weighing_accuracy_test

metadata:
  description: >
    End-to-end accuracy verification. Runs density calibration, then dispenses
    to a target mass, and reports the actual dispensed mass and error.
    Intended for verifying the accuracy of the gravimetric dispensing system.
  version: 0.1.0

parameters:
  json_inputs:
    - key: purge_rotations
      description: Rotations for priming/purging the nozzle before calibration
      default: 2.0
    - key: rotations_per_increment
      description: Motor rotations dispensed per increment for density calibration
      default: 2.0
    - key: num_increments
      description: Number of increments for density calibration
      default: 5
    - key: calibration_speed_rps
      description: Motor speed during density calibration [rev/s]
      default: 1.0
    - key: target_g
      description: Target mass to dispense for accuracy verification [g]
    - key: dispense_speed_rps
      description: Motor speed during dispensing [rev/s]
      default: 1.0

steps:
  - key: purge
    name: Purge nozzle to ensure it is fully primed
    node: high_viscosity_liquid_weighing
    action: purge
    use_parameters:
      args:
        rotations: purge_rotations

  - key: tare_1
    name: Tare balance before density calibration
    node: high_viscosity_liquid_weighing
    action: tare

  - key: calibrate_density
    name: Calibrate density [g/rot]
    node: high_viscosity_liquid_weighing
    action: calibrate_density
    use_parameters:
      args:
        rotations_per_increment: rotations_per_increment
        num_increments: num_increments
        speed_rps: calibration_speed_rps

  - key: tare_2
    name: Tare balance before dispensing
    node: high_viscosity_liquid_weighing
    action: tare

  - key: dispense_and_verify
    name: Dispense to target mass and measure accuracy
    node: high_viscosity_liquid_weighing
    action: dispense_target_mass
    use_parameters:
      args:
        target_g: target_g
        speed_rps: dispense_speed_rps
